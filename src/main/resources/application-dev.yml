spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orbitrack}
    username: ${DB_USERNAME:orbitrack_app}
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:orbitrack-secret-key-orbitrack-secret-key-123456}
    expiration-millis: ${JWT_EXPIRATION_MILLIS:86400000}